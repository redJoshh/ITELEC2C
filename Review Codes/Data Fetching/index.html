      const token = "XrGdWBOzDNvkNwVWXeCiqIKbXcMPEjNunrRvWetU";

      getArtist("Radiohead");

      async function getArtist(query) {
        try {
          const response = await fetch(
            `https://api.discogs.com//database/search?artist${query}`,
            {
              method: "GET",
              headers: {
                Authorization: `Discogs token=${token}`,
              },
            },
          );

          const data = await response.json();

          console.log(data);
        } catch (error) {
          console.error("Error in fetching user data", error);
        }
      }
